name: Deploy Examples to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            examples/basic/package-lock.json
            examples/video-texture/package-lock.json

      - name: Build basic example
        working-directory: examples/basic
        run: |
          npm ci
          npm run build -- --base=/r3f-mind-ar/examples/basic/

      - name: Build video-texture example
        working-directory: examples/video-texture
        run: |
          npm ci
          npm run build -- --base=/r3f-mind-ar/examples/video-texture/

      - name: Assemble deployment directory
        run: |
          mkdir -p deploy/examples/basic
          mkdir -p deploy/examples/video-texture
          cp -r examples/basic/dist/. deploy/examples/basic/
          cp -r examples/video-texture/dist/. deploy/examples/video-texture/
          cp .github/pages/index.html deploy/index.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          force_orphan: true
